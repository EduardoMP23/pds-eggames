# Nginx reverse-proxy config — Hostinger VPS
#
# 1. Copy to /etc/nginx/sites-available/board-games
# 2. ln -s /etc/nginx/sites-available/board-games /etc/nginx/sites-enabled/
# 3. Replace YOUR_DOMAIN with your actual domain or VPS IP
# 4. Run: certbot --nginx -d YOUR_DOMAIN   (for free HTTPS via Let's Encrypt)
# 5. nginx -t && systemctl reload nginx

upstream node_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Certificates filled in automatically by certbot
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static assets served directly by Nginx (no Node.js overhead) ─────────
    root /var/www/board-games/public;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Socket.io long-polling endpoint ──────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://node_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # ── Everything else (HTML pages + API) → Node.js ──────────────────────────
    location / {
        proxy_pass         http://node_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json;
    gzip_min_length   1024;
    gzip_vary         on;
}
