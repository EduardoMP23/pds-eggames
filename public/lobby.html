<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>EgGames — Sala de Espera</title>
  <link rel="stylesheet" href="/css/pixel-lobby.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='2' y='2' width='12' height='12' fill='%23ff2e88'/><rect x='4' y='4' width='2' height='2' fill='%23000'/><rect x='10' y='4' width='2' height='2' fill='%23000'/><rect x='4' y='10' width='8' height='2' fill='%2300f0ff'/></svg>" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { background: var(--bg-0); }
    #root { min-height: 100vh; position: relative; z-index: 2; }
    .pl-screen { min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }
    .brand-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:4px solid var(--neon-pink); background:linear-gradient(180deg,rgba(0,0,0,0.7),rgba(0,0,0,0)); position:relative; z-index:5; }
    .brand-bar::after { content:''; position:absolute; left:0; right:0; bottom:-8px; height:4px; background:var(--neon-cyan); box-shadow:0 0 12px var(--neon-cyan); }
    .brand-logo { display:flex; align-items:center; gap:10px; font-family:'Press Start 2P',monospace; font-size:14px; color:var(--ink-0); text-decoration:none; }
    .brand-right { display:flex; align-items:center; gap:12px; }

    /* ── Adult warning modal ── */
    .adult-overlay {
      position: fixed; inset: 0; z-index: 9500;
      background: rgba(0,0,0,0.94);
      display: flex; align-items: center; justify-content: center;
      animation: enter-bottom 0.2s steps(4);
    }
    .adult-box {
      display: flex; flex-direction: column; gap: 18px;
      padding: 28px 24px; width: min(360px, 92vw); text-align: center;
    }
    .adult-icon { font-size: 42px; line-height: 1; }
    .adult-title {
      font-family: 'Press Start 2P', monospace; font-size: 13px;
      color: #ff3860; text-shadow: 0 0 12px #ff3860;
    }
    .adult-body {
      font-family: 'VT323', monospace; font-size: 18px;
      color: var(--ink-1); line-height: 1.5;
    }
    .adult-actions { display: flex; gap: 10px; justify-content: center; }

    /* ── Invite modal ── */
    .invite-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      animation: enter-bottom 0.2s steps(4);
    }
    .invite-box {
      display: flex; flex-direction: column; gap: 18px;
      padding: 24px; width: min(320px, 92vw); align-items: center;
    }
    .invite-box canvas, .invite-box img { image-rendering: pixelated; border: 4px solid var(--neon-cyan); box-shadow: 0 0 18px rgba(0,240,255,0.4); display: block; }
    .invite-code-row {
      width: 100%; display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.55); padding: 10px 14px;
      box-shadow: inset 0 0 0 2px rgba(0,240,255,0.35);
    }
    .invite-code-text {
      font-family: 'VT323', monospace; font-size: 1.2rem;
      color: var(--neon-cyan); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="fx-grid"></div>
  <div class="fx-crt-glow"></div>
  <div class="fx-flicker"></div>
  <div class="fx-scanlines"></div>
  <canvas id="particles" style="position:fixed;inset:0;z-index:1;pointer-events:none"></canvas>

  <div id="root"></div>

  <script src="/js/pixel-sprites.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  /* ── Sprite ────────────────────────────────────────────────── */
  function Sprite({ kind, color, size }) {
    const ref = useRef(null);
    const sz = size || 40;
    useEffect(() => {
      if (ref.current && window.renderSprite) window.renderSprite(ref.current, kind, color || '#ff2e88', sz);
    }, [kind, color, sz]);
    return <div ref={ref} style={{ width: sz, height: sz, flexShrink: 0, imageRendering: 'pixelated' }} />;
  }

  const FALLBACK_AV = window.AVATAR_KEYS || ['knight','wizard','ninja','robot','alien','cat','ghost','skull','bat','dragon','pug','slime'];
  const FALLBACK_CL = ['#ff2e88','#00f0ff','#39ff7a','#ffe600','#ff7a1f','#b14aed','#ff3860','#5effc1'];
  const GAME_META = {
    coup:      { title: 'COUP',       accent: '#ffe600', frameClass: 'px-frame--yellow' },
    ito:       { title: 'ITO',        accent: '#00f0ff', frameClass: 'px-frame--cyan'   },
    hive:      { title: 'HIVE',       accent: '#ff7a1f', frameClass: 'px-frame--green'  },
    pife:      { title: 'PIFE',       accent: '#f7b500', frameClass: 'px-frame--yellow' },
    pioramigo: { title: 'PIOR AMIGO', accent: '#b14aed', frameClass: 'px-frame--pink'   },
  };
  const EMOJI_LIST = ['👋','🔥','😈','🎲','💀','⚡','🛸','👑'];

  function BrandBar({ playerName, avatarKind, avatarColor, onBack }) {
    return (
      <header className="brand-bar">
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          {onBack && (
            <button className="btn-px btn-px--ghost btn-px--sm" onClick={onBack}>← SAIR</button>
          )}
          <a href="/" className="brand-logo">
            <span className="pxdot pxdot--pink" />
            EgGames
          </a>
        </div>
        <div className="brand-right">
          {avatarKind && <Sprite kind={avatarKind} color={avatarColor} size={28} />}
          {playerName && (
            <span style={{ fontFamily:"'Press Start 2P'", fontSize:9, color:'var(--ink-0)' }}>{playerName}</span>
          )}
        </div>
      </header>
    );
  }

  function Footer() {
    return <footer className="px-footer">© 2156 EgGames — TODOS OS BITS RESERVADOS</footer>;
  }

  /* ── Invite Modal ──────────────────────────────────────────── */
  function InviteModal({ roomId, onClose }) {
    const qrRef = useRef(null);
    const [copied, setCopied] = useState(false);
    const url = window.location.origin + '/lobby/' + roomId;

    useEffect(() => {
      if (!qrRef.current || !window.QRCode) return;
      qrRef.current.innerHTML = '';
      new QRCode(qrRef.current, {
        text: url,
        width: 220,
        height: 220,
        colorDark:  '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
    }, []);

    const copy = async () => {
      try { await navigator.clipboard.writeText(url); } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
      }
      setCopied(true); setTimeout(() => setCopied(false), 1800);
    };

    return (
      <div className="invite-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div className="invite-box px-frame px-frame--cyan">
          <div style={{ width: '100%', display: 'flex', alignItems: 'center' }}>
            <button className="btn-px btn-px--ghost btn-px--sm" onClick={onClose}>←</button>
            <span style={{ fontFamily: "'Press Start 2P'", fontSize: 9, color: 'var(--ink-2)', marginLeft: 12 }}>CONVITE</span>
          </div>
          <div ref={qrRef} style={{ lineHeight: 0 }} />
          <div className="invite-code-row">
            <span className="invite-code-text">{url}</span>
            <button className="btn-px btn-px--cyan btn-px--sm" onClick={copy}>
              {copied ? '✓ OK' : '📋 COPIAR'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════
     LOBBY SCREEN
  ══════════════════════════════════════════════════════════════ */
  function LobbyScreen() {
    const roomId   = useMemo(() => window.location.pathname.split('/').pop(), []);
    const myName   = sessionStorage.getItem('playerName');
    const myAvatar = sessionStorage.getItem('playerAvatar') || FALLBACK_AV[0];
    const myColor  = sessionStorage.getItem('playerColor')  || FALLBACK_CL[0];
    const myIdRef  = useRef(sessionStorage.getItem('playerId'));

    const socketRef = useRef(null);
    const chatRef   = useRef(null);
    const chatOpenRef = useRef(false);

    const [players,  setPlayers]  = useState([]);
    const [messages, setMessages] = useState([]);
    const [draft,    setDraft]    = useState('');
    const [isHost,   setIsHost]   = useState(false);
    const [isReady,       setIsReady]       = useState(false);
    const [adultOk,       setAdultOk]       = useState(false);
    const [showAdultModal,setShowAdultModal] = useState(false);

    const toggleReady = () => {
      if (!isReady && gameData?.gameId === 'pioramigo' && !adultOk) {
        setShowAdultModal(true);
        return;
      }
      const next = !isReady;
      setIsReady(next);
      socketRef.current?.emit('lobby:ready', { roomId, ready: next });
    };

    const confirmAdult = () => {
      setAdultOk(true);
      setShowAdultModal(false);
      setIsReady(true);
      socketRef.current?.emit('lobby:ready', { roomId, ready: true });
    };

    const [gameData, setGameData] = useState(null);
    const [showInvite, setShowInvite] = useState(false);
    const [hostId,   setHostId]   = useState(null);
    const [chatOpen, setChatOpen] = useState(false);
    const [unread,   setUnread]   = useState(0);

    useEffect(() => {
      if (!myName) {
        sessionStorage.setItem('pendingRoom', roomId);
        window.location.href = '/';
        return;
      }

      if (window.renderParticles) window.renderParticles();

      const socket = io();
      socketRef.current = socket;
      socket.emit('room:join', { roomId, playerName: myName, avatar: myAvatar, color: myColor, playerId: myIdRef.current });

      socket.on('room:joined', data => {
        myIdRef.current = data.playerId;
        sessionStorage.setItem('playerId', data.playerId);
        setIsHost(data.isHost);
        setHostId(data.hostPlayerId || (data.players || [])[0]?.playerId || null);
        setGameData(data);
        setPlayers(data.players || []);
        const gTitle = (GAME_META[data.gameId] || {}).title || (data.gameId || 'Jogo').toUpperCase();
        setMessages(m => [...m, { kind: 'system', text: `Sala de ${gTitle} criada. Compartilhe o link com seus amigos!` }]);
        if (data.status === 'playing') window.location.href = '/game/' + roomId;
      });

      socket.on('room:join-error', data => {
        alert('Erro ao entrar na sala: ' + (data.message || 'Erro'));
        window.location.href = '/';
      });

      socket.on('lobby:player-joined', data => {
        setPlayers(data.players || []);
        if (data.newHostId) setHostId(data.newHostId);
        const np = (data.players || []).find(p => p.playerId === data.newPlayerId);
        if (np) setMessages(m => [...m, { kind: 'system', text: `${np.playerName} entrou na sala.` }]);
      });

      socket.on('lobby:player-left', data => {
        setPlayers(data.players || []);
        if (data.newHostId) {
          setHostId(data.newHostId);
          if (data.newHostId === myIdRef.current) setIsHost(true);
        }
        setMessages(m => [...m, { kind: 'system', text: 'Um jogador saiu da sala.' }]);
      });

      socket.on('lobby:host-changed', data => {
        setPlayers(data.players || []);
        if (data.newHostId) {
          setHostId(data.newHostId);
          if (data.newHostId === myIdRef.current) setIsHost(true);
        }
      });

      socket.on('game:start', data => {
        window.location.href = '/game/' + (data.roomId || roomId);
      });

      socket.on('chat:message', data => {
        setMessages(m => [...m, { kind: 'chat', author: data.playerName, text: data.text }]);
        if (!chatOpenRef.current) setUnread(u => u + 1);
      });

      socket.on('lobby:ready-update', data => {
        setPlayers(data.players || []);
      });

      return () => socket.disconnect();
    }, []);

    useEffect(() => {
      if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }, [messages]);

    useEffect(() => {
      chatOpenRef.current = chatOpen;
      if (chatOpen) setUnread(0);
    }, [chatOpen]);

    const sendMessage = (text) => {
      const t = (text !== undefined ? text : draft).trim();
      if (!t) return;
      socketRef.current?.emit('chat:message', { roomId, text: t });
      if (text === undefined) setDraft('');
    };

    const startGame = () => socketRef.current?.emit('lobby:start', { roomId });

    const copyLink = () => setShowInvite(true);

    const game    = gameData ? (GAME_META[gameData.gameId] || { title: (gameData.gameId || '').toUpperCase(), accent: 'var(--neon-pink)', frameClass: 'px-frame--pink' }) : null;
    const maxPl   = gameData?.maxPlayers || 6;
    const connPl  = players.filter(p => p.connected !== false);
    const minPl   = gameData?.minPlayers || 2;
    const nonHostPl = connPl.filter(p => p.playerId !== hostId);
    const allReady  = connPl.length >= minPl && nonHostPl.every(p => p.ready);
    const canStart  = isHost && allReady;

    function avatarFor(p, idx) {
      return {
        kind:  p.avatar || (p.playerId === myIdRef.current ? myAvatar : FALLBACK_AV[idx % FALLBACK_AV.length]),
        color: p.color  || (p.playerId === myIdRef.current ? myColor  : FALLBACK_CL[idx % FALLBACK_CL.length]),
      };
    }

    const leaveRoom = () => {
      socketRef.current?.disconnect();
      window.location.href = '/';
    };

    return (
      <div className="pl-screen enter-bottom">
        {showInvite && <InviteModal roomId={roomId} onClose={() => setShowInvite(false)} />}

        {showAdultModal && (
          <div className="adult-overlay">
            <div className="adult-box px-frame px-frame--pink">
              <div className="adult-icon">🔞</div>
              <div className="adult-title">CONTEÚDO +18</div>
              <div className="adult-body">
                Este jogo contém perguntas com conteúdo explícito, sensível e impróprio para menores de 18 anos.<br/><br/>
                Ao continuar, você confirma que tem 18 anos ou mais e concorda em participar.
              </div>
              <div className="adult-actions">
                <button className="btn-px btn-px--green" onClick={confirmAdult}>
                  ✓ TENHO 18+ — CONTINUAR
                </button>
                <button className="btn-px btn-px--ghost" onClick={() => setShowAdultModal(false)}>
                  ✕ CANCELAR
                </button>
              </div>
            </div>
          </div>
        )}

        <BrandBar playerName={myName} avatarKind={myAvatar} avatarColor={myColor} onBack={leaveRoom} />

        <main style={{ flex:1, padding:'24px 16px 32px', maxWidth:1200, margin:'0 auto', width:'100%', display:'flex', flexDirection:'column', gap:20 }}>

          {/* Header: game info + room code */}
          <div style={{ display:'flex', gap:16, alignItems:'stretch', flexWrap:'wrap' }}>
            {game && (
              <div className={`px-frame ${game.frameClass} game-info-box`} style={{ padding:'14px 18px', display:'flex', alignItems:'center', gap:16, flex:'1 1 auto', minWidth:220 }}>
                <div>
                  <div style={{ fontFamily:"'Press Start 2P'", fontSize:8, color:'var(--ink-2)', letterSpacing:'0.1em' }}>JOGO SELECIONADO</div>
                  <div style={{ fontFamily:"'Press Start 2P'", fontSize:18, color:game.accent, textShadow:`0 0 10px ${game.accent}`, marginTop:6 }}>{game.title}</div>
                </div>
                <div style={{ marginLeft:'auto', fontFamily:"'VT323'", fontSize:18, color:'var(--ink-1)' }}>
                  {gameData?.minPlayers}–{gameData?.maxPlayers} jogadores
                </div>
              </div>
            )}
            <div className="room-row" style={{ display:'flex', gap:12, alignItems:'stretch', flex:'0 1 auto', minWidth:0 }}>
              <div className="px-frame px-frame--cyan sala-box" style={{ padding:'14px 18px', display:'flex', flexDirection:'column', gap:8, flex:'0 1 auto', minWidth:0 }}>
                <div style={{ fontFamily:"'Press Start 2P'", fontSize:8, color:'var(--ink-2)' }}>SALA</div>
                <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{ fontFamily:"'Press Start 2P'", fontSize:14, color:'var(--neon-cyan)', textShadow:'0 0 8px var(--neon-cyan)' }}>#{roomId}</div>
                  <button className="btn-px btn-px--cyan btn-px--sm" onClick={copyLink}>
                    📋 CONVIDAR
                  </button>
                </div>
              </div>
              <button className="chat-fab" onClick={() => setChatOpen(true)}>
                💬<span>CHAT</span>
                {unread > 0 && <span className="chat-badge">{unread > 9 ? '9+' : unread}</span>}
              </button>
            </div>
          </div>

          {/* 2-col: players + chat */}
          <div style={{ display:'grid', gridTemplateColumns:'1.2fr 1fr', gap:20, alignItems:'stretch', height:'var(--lobby-panel-h, 460px)' }}>

            {/* Players */}
            <div className="px-frame px-frame--purple" style={{ padding:20, display:'flex', flexDirection:'column', gap:14, minHeight:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style={{ fontFamily:"'Press Start 2P'", fontSize:11, color:'var(--neon-purple)' }}>
                  &gt; JOGADORES_ {connPl.length}/{maxPl}
                </div>
                <div style={{ fontFamily:"'Press Start 2P'", fontSize:8, color:'var(--ink-2)' }}>
                  <span className="pxdot" style={{ width:6, height:6, marginRight:6, background:'var(--neon-green)', boxShadow:'0 0 6px var(--neon-green)' }} />
                  AGUARDANDO
                </div>
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:8, flex:1, minHeight:0, overflowY:'auto' }}>
                {players.map((p, idx) => {
                  const av = avatarFor(p, idx);
                  const isMe = p.playerId === myIdRef.current;
                  const isPHost = p.playerId === (hostId || (players[0] || {}).playerId);
                  return (
                    <div key={p.playerId} className="player-row" style={{ borderLeftColor: av.color, opacity: p.connected === false ? 0.5 : 1 }}>
                      <div className="sprite-bob" style={{ animationDelay:`${idx * 0.2}s` }}>
                        <Sprite kind={av.kind} color={av.color} size={36} />
                      </div>
                      <div style={{ flex:1 }}>
                        <div className="player-row__name" style={{ color:av.color, textShadow:`0 0 6px ${av.color}` }}>
                          {p.playerName}{isMe ? ' (VOCÊ)' : ''}
                        </div>
                      </div>
                      <div className="player-row__badges">
                        {isPHost && <span className="status-host">👑 HOST</span>}
                        {isMe && !isPHost && (
                          <span
                            className={isReady ? 'status-ready' : 'status-wait'}
                            style={{ cursor:'pointer' }}
                            onClick={toggleReady}
                          >
                            {isReady ? '✓ PRONTO' : '○ AGUARDE'}
                          </span>
                        )}
                        {!isMe && !isPHost && (
                          <span className={p.ready ? 'status-ready' : 'status-wait'}>
                            {p.ready ? '✓ PRONTO' : 'AGUARD.'}
                          </span>
                        )}
                        {p.connected === false && <span className="status-dc">DC</span>}
                      </div>
                    </div>
                  );
                })}

                {Array.from({ length: Math.max(0, maxPl - players.length) }).map((_, i) => (
                  <div key={`e${i}`} className="player-row" style={{ borderLeftColor:'var(--ink-2)', opacity:0.4 }}>
                    <div style={{ width:36, height:36, background:'rgba(0,0,0,0.5)', boxShadow:'inset 0 0 0 2px var(--ink-2)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Press Start 2P'", fontSize:12, color:'var(--ink-2)' }}>?</div>
                    <div className="player-row__name" style={{ color:'var(--ink-2)' }}>SLOT VAZIO</div>
                    <span className="status-empty">AGUARD.</span>
                  </div>
                ))}
              </div>

              <div className="px-hr" />

              <div style={{ display:'flex', gap:10 }}>
                {!isHost && (
                  <button
                    className={`btn-px ${isReady ? 'btn-px--green' : 'btn-px--cyan'}`}
                    onClick={toggleReady}
                    style={{ flex:1 }}
                  >
                    {isReady ? '✓ PRONTO' : '○ MARCAR PRONTO'}
                  </button>
                )}
                {isHost && (
                  <button
                    className="btn-px btn-px--yellow"
                    disabled={!canStart}
                    onClick={startGame}
                    style={{ flex:1 }}
                  >
                    ▶ INICIAR
                  </button>
                )}
              </div>

              <div style={{ fontFamily:"'Press Start 2P'", fontSize:8, color:'var(--ink-2)', textAlign:'center' }}>
                {connPl.length < minPl
                  ? `AGUARDANDO JOGADORES (${connPl.length}/${minPl})`
                  : allReady
                  ? '🟢 TODOS PRONTOS — PODE INICIAR'
                  : `AGUARDANDO CONFIRMAÇÃO DOS JOGADORES...`}
              </div>
            </div>

            {/* Chat */}
            <div className={`px-frame px-frame--cyan chat-panel${chatOpen ? ' is-open' : ''}`} style={{ padding:0, display:'flex', flexDirection:'column', height:'100%', minHeight:0 }}>
              <div style={{ padding:'14px 16px', borderBottom:'2px dashed rgba(0,240,255,0.3)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div style={{ fontFamily:"'Press Start 2P'", fontSize:11, color:'var(--neon-cyan)' }}>&gt; CHAT_</div>
                <div style={{ fontFamily:"'Press Start 2P'", fontSize:8, color:'var(--ink-2)' }}>
                  {messages.filter(m => m.kind === 'chat').length} MSGS
                </div>
                <button className="chat-close" onClick={() => setChatOpen(false)} aria-label="Fechar chat">✕</button>
              </div>

              <div ref={chatRef} className="chat-log" style={{ flex:1, minHeight:0 }}>
                {messages.map((m, i) => {
                  const isMe = m.kind !== 'system' && m.author === myName;
                  return m.kind === 'system' ? (
                    <div key={i} className="chat-msg">
                      <span className="chat-author" style={{ color:'var(--neon-yellow)' }}>· SYS</span>
                      <span className="chat-text" style={{ color:'var(--neon-yellow)', fontStyle:'italic' }}>{m.text}</span>
                    </div>
                  ) : (
                    <div key={i} className={isMe ? 'chat-msg chat-msg--mine' : 'chat-msg'}>
                      <span className="chat-author">{m.author}:</span>
                      <span className="chat-text">{m.text}</span>
                    </div>
                  );
                })}
              </div>

              <div className="emoji-row" style={{ padding:'6px 10px', borderTop:'1px dashed rgba(0,240,255,0.2)' }}>
                {EMOJI_LIST.map(e => (
                  <button key={e} className="emoji-btn" onClick={() => sendMessage(e)}>{e}</button>
                ))}
              </div>

              <div style={{ display:'flex', borderTop:'2px solid var(--neon-cyan)' }}>
                <input
                  className="input-px"
                  style={{ flex:1, boxShadow:'none', padding:'10px 12px', fontSize:16, fontFamily:"'VT323'" }}
                  placeholder="MENSAGEM..."
                  value={draft}
                  maxLength={120}
                  onChange={e => setDraft(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') sendMessage(); }}
                />
                <button
                  style={{ background:'var(--neon-pink)', color:'#000', border:'none', padding:'10px 14px', fontFamily:"'Press Start 2P'", fontSize:9, cursor:'pointer', letterSpacing:'0.1em' }}
                  onClick={() => sendMessage()}
                >ENVIAR</button>
              </div>
            </div>
          </div>
        </main>
        <Footer />
        <style>{`
          @media (max-width: 680px) {
            /* Tela fixa: sem scroll de página */
            html, body { height: 100%; overflow: hidden; }
            #root { height: 100vh; height: 100dvh; overflow: hidden; }
            .pl-screen { height: 100%; min-height: 0; overflow: hidden; }
            .px-footer { display: none; }

            /* main preenche o espaço restante e não transborda */
            main {
              flex: 1; min-height: 0; overflow: hidden;
              padding: 16px 12px !important;
              gap: 12px !important;
            }

            /* Header: jogo em cima (full width), convidar + chat lado a lado embaixo */
            .game-info-box { flex: 1 1 100% !important; }
            .room-row { flex: 1 1 100% !important; }
            .sala-box  { flex: 1 1 auto !important; }

            /* Botão de abrir (verde, ao lado de convidar) */
            .chat-fab {
              position: relative;
              display: flex; flex-direction: column; align-items: center; justify-content: center;
              gap: 4px; flex: 0 0 auto; cursor: pointer;
              padding: 10px 16px; border: none;
              background: var(--neon-green); color: var(--bg-0);
              font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 0.1em;
              box-shadow: 0 0 12px rgba(57,255,122,0.5);
            }
            .chat-fab span { font-size: 8px; }

            /* Sinal de mensagens não lidas */
            .chat-badge {
              position: absolute; top: -6px; right: -6px;
              min-width: 18px; height: 18px; padding: 0 4px;
              display: flex; align-items: center; justify-content: center;
              background: var(--neon-pink); color: #000; border-radius: 9px;
              font-family: 'Press Start 2P', monospace; font-size: 8px;
              box-shadow: 0 0 8px rgba(255,46,136,0.9);
            }

            /* Área de jogadores ocupa o resto e rola internamente */
            main > div:nth-child(2) {
              grid-template-columns: 1fr !important;
              grid-template-rows: 1fr !important;
              height: auto !important;
              flex: 1; min-height: 0;
            }
            main > div:nth-child(2) > div.px-frame--purple { height: auto; min-height: 0; }

            /* Chat vira overlay deslizante cobrindo o lobby */
            .chat-panel {
              position: fixed; inset: 0; z-index: 8000;
              width: 100%; height: 100% !important;
              transform: translateX(100%);
            }
            .chat-panel.is-open { transform: translateX(0); }

            /* Botão X de fechar */
            .chat-close {
              display: flex; align-items: center; justify-content: center;
              width: 32px; height: 32px; cursor: pointer;
              background: transparent; border: 2px solid var(--neon-cyan);
              color: var(--neon-cyan); font-family: 'Press Start 2P', monospace; font-size: 11px;
            }
          }
        `}</style>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<LobbyScreen />);
  </script>
</body>
</html>
