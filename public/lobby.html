<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXEL.LOBBY — Sala de Espera</title>
  <link rel="stylesheet" href="/css/pixel-lobby.css">
</head>
<body>

  <!-- FX Layers -->
  <div class="fx-grid"></div>
  <div class="fx-crt-glow"></div>
  <div class="fx-flicker"></div>
  <div class="fx-scanlines"></div>
  <canvas id="particles"></canvas>

  <!-- ═══════════════════════════════════════════════════════
       LOBBY SCREEN
  ════════════════════════════════════════════════════════ -->
  <div class="screen active">

    <!-- Brand bar -->
    <header class="brand-bar">
      <a href="/" class="brand-bar__logo">
        ← PIXEL.LOBBY
      </a>
      <div class="brand-bar__right">
        <div id="lobbyBrandSprite" style="width:32px;height:32px;position:relative;image-rendering:pixelated;"></div>
        <span class="brand-bar__player" id="lobbyBrandName"></span>
      </div>
    </header>

    <div class="lobby-screen-body">

      <!-- Header bar: game info + room code -->
      <div class="lobby-header-bar">
        <div class="px-frame px-frame--yellow lobby-game-box">
          <div class="lobby-game-box__label">JOGO</div>
          <div class="lobby-game-box__name" id="lobbyGameName">—</div>
        </div>

        <div class="px-frame px-frame--cyan lobby-code-box">
          <div class="lobby-code-box__label">CÓDIGO DA SALA</div>
          <div class="lobby-code-box__row">
            <div class="lobby-code-box__code" id="lobbyRoomCode">———</div>
            <button class="btn-px btn-px--cyan btn-px--sm" onclick="copyLink()">COPIAR</button>
          </div>
          <div id="copyMsg" style="font-family:'VT323',monospace;color:var(--neon-green);font-size:1rem;min-height:1.2em"></div>
        </div>
      </div>

      <!-- Main grid: players left, chat right -->
      <div class="lobby-grid">

        <!-- Players panel -->
        <div class="px-frame px-frame--purple" style="padding:1.25rem">
          <div class="players-panel-title">&gt; JOGADORES_ <span id="playerCount"></span></div>
          <div class="players-list" id="playerList"></div>
          <div class="waiting-msg" id="waitingMsg"></div>
          <div class="lobby-actions mt-1">
            <button class="btn-px btn-px--green" id="btnReady" onclick="toggleReady()">PRONTO</button>
            <button class="btn-px btn-px--yellow" id="startBtn" onclick="startGame()" style="display:none">▶ INICIAR</button>
          </div>
          <div id="startMsg" style="font-family:'VT323',monospace;color:var(--ink-2);font-size:1rem;margin-top:0.4rem;min-height:1.2em"></div>
        </div>

        <!-- Chat panel -->
        <div class="px-frame px-frame--cyan" style="padding:1.25rem">
          <div class="chat-panel-title">CHAT_ <span class="pxdot pxdot--cyan"></span></div>
          <div class="chat-box">
            <div class="chat-log" id="chatMessages"></div>
            <div class="chat-input-row">
              <input
                class="input-px"
                id="chatInput"
                type="text"
                placeholder="Mensagem..."
                maxlength="200"
                onkeydown="chatKeyDown(event)"
                autocomplete="off"
              >
              <button class="btn-px btn-px--cyan btn-px--sm" onclick="sendChat()">OK</button>
            </div>
          </div>
        </div>

      </div><!-- /lobby-grid -->

    </div><!-- /lobby-screen-body -->

    <footer class="px-footer">PIXEL.LOBBY &copy; 2156 &mdash; ALL SYSTEMS NOMINAL</footer>
  </div>

  <!-- Scripts -->
  <script src="/js/pixel-sprites.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/pages/lobby.js"></script>
</body>
</html>
