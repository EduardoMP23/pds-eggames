<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hive — Multiplayer</title>
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .hero { text-align: center; padding: 3rem 1rem 2rem; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .hero p { color: var(--muted); margin-bottom: 2rem; }
    .name-form { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 3rem; }
    .name-form input { padding: 0.6rem 1rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg2); color: var(--text); width: 240px; }
    .name-form input:focus { outline: none; border-color: var(--accent); }
    .game-card { background: var(--bg2); border: 2px solid var(--border); border-radius: 12px; padding: 2rem; cursor: pointer; transition: border-color 0.2s, transform 0.1s; text-align: center; max-width: 320px; margin: 0 auto; }
    .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .game-card .icon { font-size: 4rem; margin-bottom: 1rem; }
    .game-card h2 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    .game-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .game-card .players { font-size: 0.85rem; color: var(--accent); margin-top: 0.75rem; font-weight: 600; }
    .open-rooms { max-width: 600px; margin: 3rem auto 0; padding: 0 1rem; }
    .open-rooms h2 { margin-bottom: 1rem; color: var(--muted); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .room-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .room-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .room-item:hover { border-color: var(--accent); }
    .room-item .room-info { font-size: 0.875rem; color: var(--muted); }
    .btn { padding: 0.6rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .btn:hover { background: var(--accent-dark); }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🐝 Hive</h1>
    <p>Cerque a rainha do oponente com seus insetos hexagonais</p>
    <div class="name-form">
      <input type="text" id="playerName" placeholder="Seu nome..." maxlength="20" autocomplete="off">
      <button class="btn" onclick="saveName()">OK</button>
    </div>
    <p id="currentName" style="color: var(--accent); font-weight:600; display:none"></p>
  </div>

  <div style="padding: 0 1rem;">
    <div class="game-card" onclick="createRoom()">
      <div class="icon">🐝</div>
      <h2>Hive</h2>
      <p>Estratégia hexagonal — coloque e mova insetos para cercar a rainha adversária sem quebrar a colmeia</p>
      <div class="players">2 jogadores</div>
    </div>
  </div>

  <div class="open-rooms">
    <h2>Salas Abertas</h2>
    <div class="room-list" id="roomList">
      <p style="color:var(--muted); font-size:0.875rem">Nenhuma sala aberta</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/pages/index.js"></script>
</body>
</html>
