<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>EgGames · Jogos de tabuleiro com amigos</title>
  <link rel="stylesheet" href="/css/pixel-lobby.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='2' y='2' width='12' height='12' fill='%23ff2e88'/><rect x='4' y='4' width='2' height='2' fill='%23000'/><rect x='10' y='4' width='2' height='2' fill='%23000'/><rect x='4' y='10' width='8' height='2' fill='%2300f0ff'/></svg>" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    body { background: var(--bg-0); }
    #root { min-height: 100vh; position: relative; z-index: 2; }
    .pl-screen { min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }
    .pl-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 32px; }
    .brand-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 4px solid var(--neon-pink); background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(0,0,0,0)); position: relative; z-index: 5; }
    .brand-bar::after { content: ''; position: absolute; left: 0; right: 0; bottom: -8px; height: 4px; background: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan); }
    .brand-logo { display: flex; align-items: center; gap: 10px; font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--ink-0); text-decoration: none; }
    .brand-right { display: flex; align-items: center; gap: 12px; }
    .brand-player { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--ink-0); }

    /* ── Game Select screen ── */
    .gs-body {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 28px 24px; gap: 24px;
    }
    .gs-card-container {
      max-width: 1100px; width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 1.5rem;
    }
    .gs-rooms-section { max-width: 1100px; width: 100%; }

    @media (max-width: 600px) {
      .gs-screen { height: 100dvh; min-height: unset; overflow: hidden; }
      .gs-body   { padding: 10px; gap: 10px; overflow: hidden; }
      .gs-screen .px-footer { display: none; }
      .gs-hovered-desc { display: none; }
      .gs-card-container {
        display: flex !important; flex-direction: row;
        gap: 12px; overflow-x: auto; flex-shrink: 0;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        scrollbar-width: none; max-width: none; padding-bottom: 6px;
      }
      .gs-card-container::-webkit-scrollbar { display: none; }
      .gs-card-container .tile { scroll-snap-align: start; flex: 0 0 72%; min-width: 0; }
      .gs-rooms-section {
        flex: 1; min-height: 0; overflow: hidden; max-width: none;
        display: flex; flex-direction: column;
      }
      .gs-rooms-section .room-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    }
    @media (max-width: 600px) and (max-height: 700px) {
      .gs-card-container .tile-art  { height: 85px; }
      .gs-card-container .tile-desc { display: none; }
      .gs-card-container .tile-info { padding: 6px 8px; gap: 2px; }
      .gs-card-container .btn-px    { margin-top: 2px; padding: 0.45rem 0.8rem; }
    }

    /* ── Avatar (skin) screen ── */
    .av-screen { height: 100dvh; min-height: unset; overflow: hidden; display: flex; flex-direction: column; }
    .av-layout {
      flex: 1; overflow: hidden;
      display: grid;
      grid-template-areas: "title title" "preview icones" "preview cores" "preview buttons";
      grid-template-columns: minmax(0,1fr) minmax(0,1.5fr);
      grid-template-rows: auto 1fr auto auto;
      gap: 20px; padding: 24px;
      max-width: 920px; width: 100%; margin: 0 auto;
    }
    .av-title   { grid-area: title; text-align: center; }
    .av-preview { grid-area: preview; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; overflow: hidden; }
    .av-preview-stage { padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; min-height: 160px; }
    .av-icones  { grid-area: icones; padding: 16px; display: flex; flex-direction: column; overflow: hidden; }
    .av-sprite-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; }
    .av-cores   { grid-area: cores; padding: 16px; }
    .av-buttons { grid-area: buttons; display: flex; gap: 12px; }

    @media (max-width: 600px) {
      .av-layout {
        grid-template-areas: "preview cores" "icones icones" "buttons buttons";
        grid-template-columns: 1fr 1.5fr;
        grid-template-rows: auto 1fr auto;
        gap: 8px; padding: 8px; max-width: none;
      }
      .av-title { display: none; }
      .av-screen .px-footer { display: none; }
      .av-preview { padding: 10px; gap: 6px; }
      .av-preview-stage { min-height: 0; padding: 10px; }
      .av-icones { padding: 10px; }
      .av-cores { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="fx-grid"></div>
  <div class="fx-crt-glow"></div>
  <div class="fx-flicker"></div>
  <div class="fx-scanlines"></div>
  <canvas id="particles" style="position:fixed;inset:0;z-index:1;pointer-events:none"></canvas>

  <div id="root"></div>

  <script src="/js/pixel-sprites.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  /* ── Sprite component ──────────────────────────────────────── */
  function Sprite({ kind, color, size }) {
    const ref = useRef(null);
    const sz = size || 48;
    useEffect(() => {
      if (ref.current && window.renderSprite) {
        window.renderSprite(ref.current, kind, color || '#ff2e88', sz);
      }
    }, [kind, color, sz]);
    return <div ref={ref} style={{ width: sz, height: sz, flexShrink: 0, imageRendering: 'pixelated' }} />;
  }

  /* ── BrandBar ──────────────────────────────────────────────── */
  function BrandBar({ playerName, avatarKind, avatarColor, onBack }) {
    return (
      <header className="brand-bar">
        <div className="brand-logo">
          <span className="pxdot pxdot--pink" />
          EgGames
        </div>
        <div className="brand-right">
          {playerName && (
            <>
              {avatarKind && <Sprite kind={avatarKind} color={avatarColor} size={28} />}
              <span className="brand-player">{playerName}</span>
              {onBack && (
                <button className="btn-px btn-px--ghost btn-px--sm" onClick={onBack}>SAIR</button>
              )}
            </>
          )}
        </div>
      </header>
    );
  }

  function Footer() {
    return <footer className="px-footer">© 2156 EgGames — TODOS OS BITS RESERVADOS</footer>;
  }

  const TICKER_ITEMS = [
    '🎮 NOVA SALA CRIADA', '★ EgGames V1.3.7', '⚡ 1.247 JOGADORES ONLINE',
    '🛸 BIRO_3000 venceu COUP em 4 rodadas', '☆ ITO — modo cooperativo',
    '🐝 HIVE — cerque a rainha', '◆ NEON_KAT entrou na sala',
    '⚡ Press START para jogar', '◇ MAIS JOGOS EM BREVE',
  ];

  function Ticker() {
    const items = [...TICKER_ITEMS, ...TICKER_ITEMS];
    return (
      <div className="ticker">
        <div className="ticker-track">
          {items.map((it, i) => <span key={i} className="ticker-item">{it}</span>)}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════
     SCREEN 1 — ENTRY (nome)
  ══════════════════════════════════════════════════════════════ */
  function EntryScreen({ onContinue }) {
    const [name, setName] = useState('');
    const [error, setError] = useState('');
    const [shake, setShake] = useState(false);
    const inputRef = useRef(null);

    useEffect(() => {
      inputRef.current?.focus();
      // Se já tem nome salvo, vai direto pro avatar
      const saved = sessionStorage.getItem('playerName');
      if (saved && saved.length >= 2) onContinue(saved);
    }, []);

    const submit = () => {
      const n = name.trim().toUpperCase().slice(0, 10);
      if (n.length < 2) {
        setError('MÍNIMO 2 CARACTERES!');
        setShake(true);
        setTimeout(() => { setError(''); setShake(false); }, 2000);
        inputRef.current?.focus();
        return;
      }
      sessionStorage.setItem('playerName', n);
      onContinue(n);
    };

    return (
      <div className="pl-screen enter-bottom">
        <BrandBar />
        <Ticker />
        <main className="pl-body">
          <div style={{ textAlign: 'center' }}>
            <div className="tagline" style={{ marginBottom: 16 }}>▮ SISTEMA DE JOGOS DE TABULEIRO MULTIPLAYER ▮</div>
            <h1 className="arcade-title glitch" data-text="EgGames">EgGames</h1>
            <div className="tagline" style={{ marginTop: 16, color: 'var(--neon-yellow)' }}>
              JOGUE COM AMIGOS · SEM DOWNLOADS · SEM CADASTRO
            </div>
          </div>

          <div
            className="px-frame px-frame--cyan"
            style={{
              padding: 30, maxWidth: 480, width: '100%',
              display: 'flex', flexDirection: 'column', gap: 18,
              animation: shake ? 'shake 0.3s steps(4)' : undefined,
            }}
          >
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: 11, color: 'var(--neon-pink)' }}>
              &gt; INSIRA SEU CALLSIGN_
            </div>
            <input
              ref={inputRef}
              className="input-px"
              type="text"
              placeholder="DIGITE SEU NOME..."
              maxLength={10}
              value={name}
              onChange={e => setName(e.target.value.toUpperCase())}
              onKeyDown={e => { if (e.key === 'Enter') submit(); }}
            />
            <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: "'Press Start 2P'", fontSize: 8, color: 'var(--ink-2)' }}>
              <span>MIN 2 / MAX 10 CHARS</span>
              <span>{name.length}/10</span>
            </div>
            {error && <div style={{ fontFamily: "'Press Start 2P'", fontSize: 9, color: 'var(--neon-pink)' }}>{error}</div>}
            <button className="btn-px btn-px--cyan" onClick={submit}>▶ ENTRAR NA REDE</button>
          </div>

<div style={{ display: 'flex', gap: 18, flexWrap: 'wrap', justifyContent: 'center' }}>
            {[['JOGADORES','1.247','var(--neon-cyan)'],['SALAS ATIVAS','86','var(--neon-pink)'],['JOGOS HOJE','3.412','var(--neon-yellow)']].map(([l,v,c]) => (
              <div key={l} style={{ padding: '10px 14px', background: 'rgba(0,0,0,0.5)', boxShadow: `inset 0 0 0 2px ${c}`, textAlign: 'center', minWidth: 110 }}>
                <div style={{ fontFamily: "'Press Start 2P'", fontSize: 8, color: 'var(--ink-2)', letterSpacing: '0.15em' }}>{l}</div>
                <div style={{ fontFamily: "'Press Start 2P'", fontSize: 14, color: c, marginTop: 6, textShadow: `0 0 8px ${c}` }}>{v}</div>
              </div>
            ))}
          </div>
        </main>
        <Footer />
        <style>{`
          @keyframes shake {
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(-6px)}
            75%{transform:translateX(6px)}
          }
        `}</style>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════
     SCREEN 2 — AVATAR (logo após o nome)
  ══════════════════════════════════════════════════════════════ */
  const AV_KEYS = window.AVATAR_KEYS || ['knight','wizard','ninja','robot','alien','cat','ghost','skull','bat','dragon','pug','slime'];
  const CLR_PALETTE = [
    { name: 'magenta', hex: '#ff2e88' }, { name: 'cyan',    hex: '#00f0ff' },
    { name: 'lime',    hex: '#39ff7a' }, { name: 'amber',   hex: '#ffe600' },
    { name: 'orange',  hex: '#ff7a1f' }, { name: 'violet',  hex: '#b14aed' },
    { name: 'crimson', hex: '#ff3860' }, { name: 'mint',    hex: '#5effc1' },
  ];

  function AvatarScreen({ playerName, joinRoomId, onConfirm, onBack }) {
    const [avatar, setAvatar] = useState(sessionStorage.getItem('playerAvatar') || AV_KEYS[0]);
    const [color, setColor]   = useState(sessionStorage.getItem('playerColor')  || CLR_PALETTE[0].hex);

    useEffect(() => {
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overscrollBehavior = 'none';
      return () => {
        document.documentElement.style.overflow = '';
        document.body.style.overscrollBehavior = '';
      };
    }, []);

    const isMobile = window.innerWidth <= 600;

    const confirm = () => {
      sessionStorage.setItem('playerAvatar', avatar);
      sessionStorage.setItem('playerColor',  color);
      onConfirm({ avatar, color });
    };

    return (
      <div className="pl-screen enter-bottom av-screen">
        <BrandBar playerName={playerName} avatarKind={avatar} avatarColor={color} onBack={onBack} />
        <div className="av-layout">

          {/* Title — desktop only */}
          <div className="av-title">
            <div className="tagline">// CUSTOMIZE SEU AVATAR //</div>
            <h2 style={{ fontFamily: "'Press Start 2P'", fontSize: 'clamp(18px,3vw,28px)', color: 'var(--neon-pink)', marginTop: 12, textShadow: '0 0 18px rgba(255,46,136,0.7)' }}>
              ESCOLHA SEU LOOK
            </h2>
          </div>

          {/* Preview */}
          <div className="av-preview px-frame px-frame--cyan">
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: 9, color: 'var(--ink-2)' }}>PREVIEW</div>
            <div className="px-inset av-preview-stage">
              <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(circle at 50% 50%, ${color}33 0%, transparent 70%)` }} />
              <div className="sprite-bob">
                <Sprite kind={avatar} color={color} size={isMobile ? 72 : 120} />
              </div>
            </div>
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: isMobile ? 10 : 14, color, textShadow: `0 0 10px ${color}` }}>
              {playerName}
            </div>
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: 8, color: 'var(--ink-2)' }}>
              · {avatar.toUpperCase()}
            </div>
          </div>

          {/* Icones */}
          <div className="av-icones px-frame px-frame--purple">
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: 10, color: 'var(--neon-purple)', marginBottom: 14 }}>
              &gt; SPRITE
            </div>
            <div className="av-sprite-grid">
              {AV_KEYS.map(k => (
                <div
                  key={k}
                  onClick={() => setAvatar(k)}
                  style={{
                    background: 'rgba(0,0,0,0.6)',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    aspectRatio: '1',
                    boxShadow: avatar === k
                      ? 'inset 0 0 0 2px var(--neon-yellow), 0 0 12px var(--neon-yellow)'
                      : 'inset 0 0 0 2px var(--ink-2)',
                    transition: 'transform 0.08s steps(2)',
                  }}
                  onMouseEnter={e => { if (avatar !== k) e.currentTarget.style.transform = 'scale(1.06)'; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
                >
                  <Sprite kind={k} color={avatar === k ? color : '#6a5b9a'} size={isMobile ? 32 : 40} />
                </div>
              ))}
            </div>
          </div>

          {/* Cores */}
          <div className="av-cores px-frame px-frame--yellow">
            <div style={{ fontFamily: "'Press Start 2P'", fontSize: 10, color: 'var(--neon-yellow)', marginBottom: 14 }}>
              &gt; COR
            </div>
            <div className="color-row">
              {CLR_PALETTE.map(c => (
                <div
                  key={c.hex}
                  className={`color-chip${color === c.hex ? ' selected' : ''}`}
                  style={{ background: c.hex, color: c.hex }}
                  onClick={() => setColor(c.hex)}
                  title={c.name}
                />
              ))}
            </div>
          </div>

          {/* Buttons */}
          <div className="av-buttons">
            <button className="btn-px btn-px--ghost" onClick={onBack} style={{ flexShrink: 0 }}>← VOLTAR</button>
            <button className="btn-px btn-px--green" onClick={confirm} style={{ flex: 1 }}>
              {joinRoomId ? '▶ ENTRAR NA SALA' : '▶ ESCOLHER JOGO'}
            </button>
          </div>

        </div>
        <Footer />
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════
     SCREEN 3 — GAME SELECT
  ══════════════════════════════════════════════════════════════ */
  const GAMES = [
    {
      id: 'coup', title: 'COUP', tag: 'BLEFE', players: '2-6', duration: '15 min',
      desc: 'Minta. Roube. Elimine. Sobreviva à corte distópica do ano 2156.',
      accent: '#ffe600', frame: 'px-frame--yellow',
    },
    {
      id: 'ito', title: 'ITO', tag: 'COOP', players: '2-10', duration: '20 min',
      desc: 'Sem palavras. Sem números. Apenas você, seus amigos e a ordem cósmica.',
      accent: '#00f0ff', frame: 'px-frame--cyan',
    },
    {
      id: 'hive', title: 'HIVE', tag: 'ESTRATÉGIA', players: '2', duration: '20 min',
      desc: 'Sem tabuleiro. Sem sorte. Cerque a Rainha do oponente para vencer.',
      accent: '#ff7a1f', frame: 'px-frame--green',
    },
  ];

  function CoupArt() {
    return (
      <svg viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges" style={{width:'100%',height:'100%'}}>
        <rect x="8"  y="36" width="14" height="4" fill="#ffe600"/>
        <rect x="8"  y="30" width="14" height="4" fill="#ffe600"/>
        <rect x="8"  y="24" width="14" height="4" fill="#ffe600"/>
        <rect x="9"  y="23" width="12" height="2" fill="#ffb300"/>
        <rect x="25" y="36" width="14" height="4" fill="#ffe600"/>
        <rect x="25" y="30" width="14" height="4" fill="#ffe600"/>
        <rect x="26" y="29" width="12" height="2" fill="#ffb300"/>
        <rect x="22" y="8"  width="20" height="4" fill="#ffe600"/>
        <rect x="18" y="12" width="28" height="8" fill="#ffe600"/>
        <rect x="16" y="20" width="32" height="4" fill="#ffb300"/>
        <rect x="22" y="4"  width="4"  height="4" fill="#ffe600"/>
        <rect x="30" y="2"  width="4"  height="6" fill="#ffe600"/>
        <rect x="38" y="4"  width="4"  height="4" fill="#ffe600"/>
        <rect x="22" y="14" width="4"  height="4" fill="#ff2e88"/>
        <rect x="30" y="14" width="4"  height="4" fill="#00f0ff"/>
        <rect x="38" y="14" width="4"  height="4" fill="#39ff7a"/>
      </svg>
    );
  }
  function ItoArt() {
    return (
      <svg viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges" style={{width:'100%',height:'100%'}}>
        <rect x="4"  y="10" width="12" height="28" fill="#0d2040" stroke="#00f0ff" strokeWidth="1"/>
        <rect x="18" y="6"  width="12" height="28" fill="#0d2040" stroke="#00f0ff" strokeWidth="1"/>
        <rect x="32" y="10" width="12" height="28" fill="#0d2040" stroke="#00f0ff" strokeWidth="1"/>
        <rect x="46" y="14" width="12" height="28" fill="#0d2040" stroke="#00f0ff" strokeWidth="1"/>
        <text x="10" y="29" fontFamily="monospace" fontSize="8" fill="#00f0ff" textAnchor="middle">7</text>
        <text x="24" y="25" fontFamily="monospace" fontSize="8" fill="#00f0ff" textAnchor="middle">23</text>
        <text x="38" y="29" fontFamily="monospace" fontSize="8" fill="#00f0ff" textAnchor="middle">41</text>
        <text x="52" y="33" fontFamily="monospace" fontSize="8" fill="#00f0ff" textAnchor="middle">88</text>
      </svg>
    );
  }
  function HiveArt() {
    return (
      <svg viewBox="0 0 64 48" xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges" style={{width:'100%',height:'100%'}}>
        <polygon points="32,4 44,10 44,22 32,28 20,22 20,10" fill="#ff7a1f" stroke="#ffb060" strokeWidth="1"/>
        <polygon points="14,20 26,26 26,38 14,44 2,38 2,26"  fill="#cc5500" stroke="#ff7a1f" strokeWidth="1"/>
        <polygon points="50,20 62,26 62,38 50,44 38,38 38,26" fill="#cc5500" stroke="#ff7a1f" strokeWidth="1"/>
        <rect x="28" y="12" width="8" height="10" fill="#ffe600"/>
        <rect x="29" y="14" width="2" height="6"  fill="#0a0420"/>
        <rect x="33" y="14" width="2" height="6"  fill="#0a0420"/>
      </svg>
    );
  }
  const COVER = { coup: CoupArt, ito: ItoArt, hive: HiveArt };

  function GameSelectScreen({ player, onBack }) {
    const [hovered, setHovered]   = useState(null);
    const [rooms, setRooms]       = useState([]);
    const [creating, setCreating] = useState(false);

    useEffect(() => {
      loadRooms();
      const t = setInterval(loadRooms, 5000);
      return () => clearInterval(t);
    }, []);

    async function loadRooms() {
      try {
        const res  = await fetch('/api/rooms');
        const data = await res.json();
        setRooms(data);
      } catch (_) {}
    }

    function createRoom(gameId) {
      if (creating) return;
      setCreating(true);
      const socket = io();
      socket.emit('room:create', { playerName: player.name, gameId, avatar: player.avatar, color: player.color });
      socket.on('room:created', data => {
        sessionStorage.setItem('playerId',     data.playerId);
        sessionStorage.setItem('roomId',       data.roomId);
        sessionStorage.setItem('selectedGame', gameId);
        window.location.href = '/lobby/' + data.roomId;
      });
      socket.on('room:join-error', data => {
        alert('Erro: ' + data.message);
        setCreating(false);
        socket.disconnect();
      });
    }

    const hDesc = hovered ? GAMES.find(g => g.id === hovered)?.desc : null;

    useEffect(() => {
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overscrollBehavior = 'none';
      return () => {
        document.documentElement.style.overflow = '';
        document.body.style.overscrollBehavior = '';
      };
    }, []);

    return (
      <div className="pl-screen enter-bottom gs-screen">
        <BrandBar playerName={player.name} avatarKind={player.avatar} avatarColor={player.color} onBack={onBack} />
        <main className="gs-body">

          <div style={{ textAlign: 'center', flexShrink: 0 }}>
            <div className="tagline">// SELECT YOUR ARENA //</div>
            <h2 style={{ fontFamily: "'Press Start 2P'", fontSize: 'clamp(18px,3.5vw,32px)', color: 'var(--neon-pink)', marginTop: 12, textShadow: '0 0 18px rgba(255,46,136,0.7)' }}>
              ESCOLHA UM JOGO
            </h2>
            <div className="gs-hovered-desc" style={{ fontFamily: "'VT323'", fontSize: '1.15rem', color: 'var(--ink-1)', marginTop: 8, minHeight: '1.5em' }}>
              {hDesc || 'Aponte para um cartucho para ver os detalhes.'}
            </div>
          </div>

          <div className="gs-card-container">
            {GAMES.map(g => {
              const Cover = COVER[g.id];
              return (
                <div
                  key={g.id}
                  className={`tile px-frame ${g.frame}`}
                  onMouseEnter={() => setHovered(g.id)}
                  onMouseLeave={() => setHovered(null)}
                  onClick={() => createRoom(g.id)}
                  style={{ cursor: creating ? 'wait' : 'pointer' }}
                >
                  <div className="tile-art" style={{ background: '#000' }}>
                    <Cover />
                    <div style={{ position: 'absolute', top: 8, left: 8, background: '#000', padding: '3px 6px', fontFamily: "'Press Start 2P'", fontSize: 8, color: g.accent }}>
                      {g.tag}
                    </div>
                  </div>
                  <div className="tile-info">
                    <div className="tile-title" style={{ color: g.accent, textShadow: `2px 2px 0 #000, 0 0 10px ${g.accent}` }}>{g.title}</div>
                    <div className="tile-desc">{g.desc}</div>
                    <div className="tile-meta">👥 {g.players} · ⏱ {g.duration}</div>
                    <button
                      className="btn-px"
                      disabled={creating}
                      style={{
                        background: g.accent, color: '#0a0420', marginTop: 8, width: '100%', fontSize: 10,
                        boxShadow: `0 -4px 0 0 ${g.accent}, 0 4px 0 0 ${g.accent}, -4px 0 0 0 ${g.accent}, 4px 0 0 0 ${g.accent}, 0 0 14px ${g.accent}`,
                      }}
                    >
                      {creating ? '⏳ CRIANDO...' : '▶ JOGAR'}
                    </button>
                  </div>
                </div>
              );
            })}

            {[0, 1].map(i => (
              <div key={i} className="tile px-frame tile--coming">
                <div className="tile-art" style={{ background: 'var(--bg-2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <span style={{ fontFamily: "'Press Start 2P'", fontSize: 28, color: '#3a2a55' }}>?</span>
                </div>
                <div className="tile-info">
                  <span className="tile-tag" style={{ background: 'var(--ink-2)', color: 'var(--bg-0)' }}>EM BREVE</span>
                  <div className="tile-title" style={{ color: 'var(--ink-2)' }}>???</div>
                  <div className="tile-desc">Mais cartuchos chegando à rede em breve.</div>
                </div>
              </div>
            ))}
          </div>

          <div className="gs-rooms-section open-rooms">
            <div className="open-rooms__title">
              SALAS ABERTAS <span className="pxdot pxdot--cyan" />
            </div>
            <div className="room-list">
              {rooms.length === 0 ? (
                <div className="rooms-empty">Nenhuma sala aberta no momento.</div>
              ) : rooms.map(r => {
                const g = GAMES.find(gg => gg.id === r.gameId) || { accent: 'var(--neon-purple)', title: (r.gameId || '').toUpperCase() };
                return (
                  <div
                    key={r.roomId}
                    className="room-item"
                    style={{ borderLeftColor: g.accent }}
                    onClick={() => {
                      sessionStorage.setItem('selectedGame', r.gameId);
                      window.location.href = '/lobby/' + r.roomId;
                    }}
                  >
                    <div>
                      <div className="room-item__name">{g.title}</div>
                      <div className="room-item__meta">Host: {r.hostName} · {r.playerCount}/{r.maxPlayers} jogadores</div>
                    </div>
                    <button className="btn-px btn-px--sm btn-px--cyan">ENTRAR</button>
                  </div>
                );
              })}
            </div>
          </div>

        </main>
        <Footer />
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════
     APP ROOT
  ══════════════════════════════════════════════════════════════ */
  function App() {
    const [screen, setScreen] = useState('entry');
    const [player, setPlayer] = useState({
      name:   sessionStorage.getItem('playerName')   || '',
      avatar: sessionStorage.getItem('playerAvatar') || 'knight',
      color:  sessionStorage.getItem('playerColor')  || '#ff2e88',
    });

    useEffect(() => {
      if (window.renderParticles) window.renderParticles();
    }, []);

    const avatarAlreadyChosen = () => !!sessionStorage.getItem('playerAvatar');

    function goAfterAvatar() {
      const pending = sessionStorage.getItem('pendingRoom');
      if (pending) {
        sessionStorage.removeItem('pendingRoom');
        window.location.href = '/lobby/' + pending;
      } else {
        setScreen('select');
      }
    }

    return (
      <>
        {screen === 'entry' && (
          <EntryScreen
            onContinue={name => {
              setPlayer(p => ({ ...p, name }));
              if (avatarAlreadyChosen()) {
                goAfterAvatar();
              } else {
                setScreen('avatar');
              }
            }}
          />
        )}
        {screen === 'avatar' && (
          <AvatarScreen
            playerName={player.name}
            joinRoomId={sessionStorage.getItem('pendingRoom')}
            onConfirm={({ avatar, color }) => {
              setPlayer(p => ({ ...p, avatar, color }));
              goAfterAvatar();
            }}
            onBack={() => {
              sessionStorage.removeItem('playerName');
              setScreen('entry');
            }}
          />
        )}
        {screen === 'select' && (
          <GameSelectScreen
            player={player}
            onBack={() => {
              sessionStorage.removeItem('playerName');
              sessionStorage.removeItem('playerAvatar');
              sessionStorage.removeItem('playerColor');
              setPlayer({ name: '', avatar: 'knight', color: '#ff2e88' });
              setScreen('entry');
            }}
          />
        )}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
